# GitHub Actions 工作流名稱：顯示在 GitHub 介面上的標題
name: Python Playwright Automation CI

# 觸發條件：當 main 分支有 push 或 PR 時執行
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 全域環境變數：解決 Node.js 20 棄用警告，並強制使用 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────
# 【關鍵權限設定】
# GitHub Pages 部署需要寫入 pages 與 id-token 的權限
# 若缺少此設定，deploy 步驟會直接報 403 Permission denied
# ─────────────────────────────────────────────
permissions:
  contents: read      # 讀取 repo 原始碼
  pages: write        # 寫入 GitHub Pages
  id-token: write     # OIDC token，用於 Pages 部署驗證

jobs:
  build-and-test:
    # 使用最新的 Ubuntu Linux 環境
    runs-on: ubuntu-latest

    steps:
      # 1. 下載專案原始碼
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 建立 Python 3.11 環境
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 安裝 Python 相依套件
      # 所有版本統一由 requirements.txt 管理，這裡不額外指定套件
      # 避免手動列的版本與 requirements.txt 衝突（例如 allure-pytest 版本不同步）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 強制下載瀏覽器並安裝 Linux 系統依賴
      - name: Install Playwright Browsers
        run: |
          python -m playwright install --with-deps chromium

      # 5. 安裝 Allure CLI（產出 HTML 報告用）
      # 使用 curl 下載官方 release，比 apt-get 版本更新
      - name: Install Allure CLI
        run: |
          curl -o allure-commandline.tgz -L \
            https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          sudo tar -zxvf allure-commandline.tgz -C /opt/
          sudo ln -s /opt/allure-2.27.0/bin/allure /usr/local/bin/allure
          allure --version

      # 6. 執行自動化測試，產出 Allure 原始資料（JSON 格式）
      # --alluredir 指定 raw data 輸出目錄
      # -v 讓 CI log 顯示每個測試的名稱，方便 debug
      - name: Run Tests
        run: |
          echo "🚀 CI 環境就緒，準備執行測試..."
          pytest --alluredir=allure-results --junitxml=report.xml -v
        # 即使測試有失敗，也繼續後續步驟（產出報告）
        continue-on-error: true

      # 7. 產出 Allure HTML 報告
      # allure generate 把 raw JSON data → 靜態 HTML 網站
      - name: Generate Allure Report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report
          echo "✅ Allure HTML report generated"

      # 8. 上傳 Allure 原始資料（供下次執行比對歷史趨勢用）
      - name: Upload Allure Results (raw data)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      # 9. 上傳 Allure HTML 報告（供 GitHub Pages 部署用）
      # upload-pages-artifact 是官方 Pages 專用 action，會自動打包成正確格式
      - name: Upload Allure HTML Report to Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

      # 10. 上傳 JUnit XML 備用（部分 CI dashboard 需要此格式）
      - name: Upload JUnit XML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: report.xml
          retention-days: 7

  # ─────────────────────────────────────────────
  # 獨立的 deploy job
  # 必須與 build-and-test 分開，GitHub Pages 官方要求
  # ─────────────────────────────────────────────
  deploy-pages:
    needs: build-and-test       # 等 build job 完成才執行
    runs-on: ubuntu-latest
    # 只有 push 到 main 才部署（PR 只跑測試，不部署）
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4