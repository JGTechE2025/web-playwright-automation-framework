# GitHub Actions 工作流名稱：顯示在 GitHub 介面上的標題
name: Python Playwright Automation CI

# 觸發條件：當 main 分支有 push 或 PR 時執行
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 全域環境變數：解決 Node.js 20 棄用警告，並強制使用 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────
# 必要權限：讓 workflow 能寫入 gh-pages branch
# 若沒有這段，peaceiris/actions-gh-pages 會拋出 403
# ─────────────────────────────────────────────
permissions:
  contents: write

jobs:
  build-and-test:
    # 使用最新的 Ubuntu Linux 環境
    runs-on: ubuntu-latest

    steps:
      # 1. 下載專案原始碼：讓虛擬機能讀取你的 GitHub 程式碼
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 建立 Python 環境：設定指定的 Python 版本並開啟快取提速
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 安裝 Python 相依套件：升級 pip 並根據 requirements.txt 安裝所有測試工具
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade playwright pytest-playwright
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. 安裝 Playwright 瀏覽器：下載測試所需的 Chromium 並補齊 Linux 系統函式庫
      - name: Install Playwright Browsers
        run: |
          python -m playwright install --with-deps chromium

      # 5. 安裝 Allure CLI：下載 Java 環境與 Allure 工具，將其轉換為可執行指令
      - name: Install Allure CLI
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y default-jre
          curl -o allure.tgz -sSL \
            https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          sudo tar -xzf allure.tgz -C /opt
          sudo ln -sf /opt/allure-2.27.0/bin/allure /usr/local/bin/allure
          allure --version

      # 6. 執行自動化測試：執行 pytest 並將原始數據存入 allure-results 資料夾
      # 加上 || true 是為了確保測試失敗時，後續的報告產生步驟依然能執行
      - name: Run Tests
        run: |
          pytest --alluredir=allure-results --junitxml=report.xml || true

      # 7. 驗證數據完整性：在產生報告前，先確認 allure-results 內是否有檔案產生
      - name: Verify allure-results exists
        if: always()
        run: |
          echo "=== allure-results content ==="
          ls -la allure-results/ || echo "❌ allure-results NOT found"
          echo "Total files: $(find allure-results -type f 2>/dev/null | wc -l)"

      # 8. 轉換原始數據為 HTML：使用 Allure CLI 將 JSON 格式轉換為漂亮的網頁報告
      # 加入檔案數量判斷，若無檔案則報錯中止，避免產生空網頁
      - name: Generate Allure Report
        if: always()
        run: |
          file_count=$(find allure-results -type f 2>/dev/null | wc -l)
          if [ "$file_count" -eq 0 ]; then
            echo "❌ allure-results is empty (found 0 files), skipping generate"
            exit 1
          fi
          echo "✅ Found $file_count files, generating report..."
          allure generate allure-results --clean -o allure-report

      # 9. 上傳測試產出物：將原始數據上傳至 GitHub Artifacts，方便下載截圖 Debug
      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            allure-results/
            report.xml
          retention-days: 7

      # 10. 部署至 GitHub Pages：將生成的 HTML 資料夾推送到 gh-pages 分支發布網頁
      # 增加條件：僅在 main 分支推播時才更新網頁報告
      - name: Deploy Allure Report to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          keep_files: false