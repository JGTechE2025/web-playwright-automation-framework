# GitHub Actions 工作流名稱：顯示在 GitHub 介面上的標題
name: Python Playwright Automation CI

# 觸發條件：當 main 分支有 push 或 PR 時執行
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 全域環境變數：解決 Node.js 20 棄用警告，並強制使用 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    # 使用最新的 Ubuntu Linux 環境
    runs-on: ubuntu-latest

    steps:
      # 1. 下載專案原始碼
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 建立 Python 3.11 環境
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # 開啟快取功能，下次 Push 會跑得更快

      # 3. 安裝 Python 相依套件 (暫時關閉快取以確保乾淨)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 強制重新安裝 playwright 相關套件，確保版本最新
          pip install --upgrade playwright pytest-playwright
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. 【核心修正】強制下載瀏覽器並安裝 Linux 系統依賴
      - name: Install Playwright Browsers
        run: |
          # 使用 python -m 指令並加上 --with-deps，確保 Linux 必要的 .so 檔都齊全
          python -m playwright install --with-deps chromium

      # 5. 執行自動化測試
      - name: Run Tests
        run: |
          echo "🚀 CI 環境就緒，準備執行測試..."
          # 目前先執行 echo 驗證流程，未來真正要跑測試時改為執行: pytest
          # echo "Hello Joe! Your Playwright CI is running successfully."
          # 範例：執行測試並產生 XML 報告
          # pytest test_checkout.py
          pytest --junitxml=report.xml

      # 6. 【CD 基礎】上傳測試結果 (Artifacts)
      # 即使測試失敗 (Failure) 也會執行，這能讓你下載 Log 或截圖來 Debug
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            test-results/
            report.xml
          retention-days: 7 # 檔案保留 7 天