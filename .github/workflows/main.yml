# GitHub Actions 工作流名稱：顯示在 GitHub 介面上的標題
name: Python Playwright Automation CI

# 觸發條件：當 main 分支有 push 或 PR 時執行
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 全域環境變數：解決 Node.js 20 棄用警告，並強制使用 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────
# 必要權限：讓 workflow 能寫入 gh-pages branch
# 若沒有這段，peaceiris/actions-gh-pages 會拋出 403
# ─────────────────────────────────────────────
permissions:
  contents: write

jobs:
  build-and-test:
    # 使用最新的 Ubuntu Linux 環境
    runs-on: ubuntu-latest

    steps:
      # 1. 下載專案原始碼
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 建立 Python 3.11 環境
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 安裝 Python 相依套件
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade playwright pytest-playwright
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. 安裝 Playwright 瀏覽器與系統依賴
      - name: Install Playwright Browsers
        run: |
          python -m playwright install --with-deps chromium

      # 5. 安裝 Allure CLI
      # 原理：Allure CLI 是 Java 工具，透過官方 PPA 安裝可確保版本穩定
      # 為什麼不用 pip install allure-pytest 產報告？
      # allure-pytest 只負責產生 raw JSON results，
      # 真正把 JSON → HTML 靜態報告需要 allure CLI (Java)
      - name: Install Allure CLI
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y default-jre
          curl -o allure.tgz -sSL \
            https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          sudo tar -xzf allure.tgz -C /opt
          sudo ln -sf /opt/allure-2.27.0/bin/allure /usr/local/bin/allure
          allure --version

      # 6. 執行自動化測試，指定 alluredir 輸出路徑
      # --alluredir=allure-results 讓 allure-pytest 把 raw JSON 寫到這裡
      # CI 環境不啟動 Allure 時間戳（conftest 只在沒有手動指定時才注入）
      - name: Run Tests
        run: |
          echo "🚀 CI 環境就緒，準備執行測試..."
          pytest --alluredir=allure-results --junitxml=report.xml || true
        # || true：即使有測試失敗，也繼續執行後續的報告產出步驟
        # 這樣才能在 GitHub Pages 上看到失敗的測試詳情

      # 7. 用 Allure CLI 將 raw results → 靜態 HTML 報告
      - name: Generate Allure Report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report
          echo "✅ Allure HTML report generated"

      # 8. 上傳 XML + 截圖等原始產出（供 debug 用）
      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            allure-results/
            report.xml
          retention-days: 7

      # 9. 部署 Allure HTML 報告到 GitHub Pages
      # 只在 push 到 main 時部署（PR 不部署，避免未審查的程式碼覆蓋報告）
      # peaceiris/actions-gh-pages 會把 allure-report/ 的內容推送到 gh-pages branch
      - name: Deploy Allure Report to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          # keep_files: false → 每次都用最新報告完整覆蓋，不累積舊檔案
          keep_files: false